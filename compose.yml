services:
  miplay:
    image: ghcr.io/juneix/miplay
    # image: docker.1ms.run/juneix/miplay  # 毫秒镜像加速
    container_name: miplay
    network_mode: host
    restart: unless-stopped
    environment:
      WEB_PORT: 8300
    volumes:
      - ./conf:/app/conf
