<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiPlay</title>
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #17212b;
      --muted: #566371;
      --panel: rgba(255, 252, 247, 0.92);
      --line: rgba(23, 33, 43, 0.1);
      --line-strong: rgba(23, 33, 43, 0.16);
      --accent: #db5f28;
      --accent-soft: rgba(219, 95, 40, 0.12);
      --accent-active: rgba(219, 95, 40, 0.18);
      --good: #237a57;
      --good-soft: rgba(35, 122, 87, 0.1);
      --warn: #9e5d12;
      --warn-soft: rgba(158, 93, 18, 0.1);
      --shadow: 0 24px 60px rgba(23, 33, 43, 0.08);
      --radius: 18px;
      --radius-sm: 12px;
      --input-bg: #fffdf9;
      --item-bg: rgba(255, 255, 255, 0.7);
      --status-idle-bg: rgba(23, 33, 43, 0.06);
      --status-idle-text: #566371;
    }

    :root[data-theme="dark"] {
      --bg: #0f0f11;
      --ink: #e8e8ec;
      --muted: #8b8b96;
      --panel: #1a1a1f;
      --line: rgba(255, 255, 255, 0.06);
      --line-strong: rgba(255, 255, 255, 0.12);
      --accent: #638cff;
      --accent-soft: rgba(99, 140, 255, 0.12);
      --accent-active: rgba(99, 140, 255, 0.16);
      --good: #34d399;
      --good-soft: rgba(52, 211, 153, 0.12);
      --warn: #fbbf24;
      --warn-soft: rgba(251, 191, 36, 0.12);
      --shadow: none;
      --input-bg: #0f0f11;
      --item-bg: #0f0f11;
      --status-idle-bg: rgba(255, 255, 255, 0.05);
      --status-idle-text: #8b8b96;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(219, 95, 40, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(35, 122, 87, 0.12), transparent 26%),
        linear-gradient(180deg, #f8f2ea 0%, var(--bg) 100%);
      min-height: 100vh;
      transition: background 0.2s ease, color 0.2s ease;
    }
    :root[data-theme="dark"] body {
      background:
        radial-gradient(circle at top left, rgba(99, 140, 255, 0.1), transparent 32%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.08), transparent 26%),
        linear-gradient(180deg, #15151a 0%, var(--bg) 100%);
    }
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }
    .hero {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }
    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }
    .theme-toggle {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .theme-toggle:hover {
      border-color: var(--line-strong);
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }
    .subtitle {
      max-width: 760px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }
    .status {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .status strong { font-size: 16px; }
    .status span { color: var(--muted); }
    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(320px, 0.85fr) minmax(420px, 1.15fr);
      align-items: start;
    }
    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .panel-stack {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .panel h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .panel p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
    }
    .field label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      background: var(--input-bg);
      color: var(--ink);
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    input:focus {
      outline: 2px solid var(--accent-active);
      border-color: color-mix(in srgb, var(--accent) 50%, transparent);
    }
    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .actions.bottom-right {
      margin-top: auto;
      justify-content: flex-end;
      padding-top: 14px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary {
      background: var(--accent);
      color: white;
    }
    .secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .ghost {
      background: rgba(23, 33, 43, 0.06);
      color: var(--ink);
    }
    :root[data-theme="dark"] .ghost {
      background: rgba(255, 255, 255, 0.08);
    }
    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }
    .panel-head .panel-copy {
      min-width: 0;
      flex: 1;
    }
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }
    .icon-btn:hover {
      border-color: var(--line-strong);
      background: var(--accent-soft);
    }
    .warning {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--warn-soft);
      color: var(--warn);
      font-size: 13px;
      line-height: 1.6;
    }
    .success {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--good-soft);
      color: var(--good);
      font-size: 13px;
    }
    .device-list {
      display: grid;
      gap: 14px;
      margin-top: 6px;
    }
    .device-row {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }
    .device-check {
      width: 24px;
      height: 24px;
      margin: 34px 0 0;
      flex-shrink: 0;
    }
    .device-card {
      min-width: 0;
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 20px;
      background: var(--item-bg);
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .device-card.enabled {
      border-color: color-mix(in srgb, var(--accent) 42%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    .device-row:hover .device-card {
      border-color: var(--line-strong);
    }
    .device-row:hover .device-card.enabled {
      border-color: color-mix(in srgb, var(--accent) 52%, transparent);
    }
    .device-head {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .device-image {
      width: 78px;
      height: 78px;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      background-color: rgba(23, 33, 43, 0.06);
      flex-shrink: 0;
    }
    :root[data-theme="dark"] .device-image {
      background-color: rgba(255, 255, 255, 0.06);
    }
    .device-title {
      min-width: 0;
      flex: 1;
    }
    .device-title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }
    .name-editor {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
    }
    .name-display {
      min-width: 0;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.2;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .name-input {
      min-width: 0;
      flex: 1;
      display: none;
      border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
      background: var(--input-bg);
      padding: 10px 14px;
      font-weight: 700;
      font-size: 18px;
      color: var(--ink);
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(23, 33, 43, 0.08);
    }
    .name-editor.editing .name-display { display: none; }
    .name-editor.editing .name-input { display: block; }
    .name-input:focus {
      outline: none;
      border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      box-shadow: 0 0 0 3px var(--accent-active);
    }
    .edit-icon {
      width: 20px;
      height: 20px;
      color: var(--muted);
      flex-shrink: 0;
      cursor: pointer;
      opacity: 0.85;
    }
    .edit-icon:hover {
      color: var(--accent);
      opacity: 1;
    }
    .model-text {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta:empty {
      display: none;
    }
    .device-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr auto;
      align-items: end;
      margin-top: 2px;
    }
    @media (max-width: 720px) {
      .device-grid {
        grid-template-columns: 1fr;
      }
    }
    .device-status {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      background: var(--status-idle-bg);
      color: var(--status-idle-text);
    }
    .status-chip.playing {
      background: var(--good-soft);
      color: var(--good);
    }
    .loading {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
    }
    .status-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      min-height: 20px;
    }
    .footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <div class="eyebrow">AIRPLAY BRIDGE</div>
        <button class="theme-toggle" id="themeToggle" type="button">夜间</button>
      </div>
      <h1>MiPlay</h1>
      <div class="subtitle">
        这台机器只负责把 AirPlay 音频桥接到小米音箱。AirPlay 2 有线输出由外部
        <code>shairport-sync</code> 提供；MiPlay 只做无线桥接与共存检测。
      </div>
    </section>

    <section class="status" id="statusBar">
      <div>
        <strong id="statusTitle">正在读取状态</strong>
        <span id="statusText">请稍候。</span>
      </div>
      <div id="statusCounts"></div>
    </section>

    <div class="grid">
      <section class="panel">
        <h2>小米账号</h2>
        <p>支持账号密码或 Cookie。</p>
        <div class="row">
          <div class="field">
            <label for="account">账号</label>
            <input id="account" placeholder="Xiaomi account">
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" type="password" placeholder="Optional if Cookie is used">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="userId">userId</label>
            <input id="userId" placeholder="userId">
          </div>
          <div class="field">
            <label for="passToken">passToken</label>
            <input id="passToken" type="password" placeholder="passToken">
          </div>
        </div>
        <p class="hint" id="accountHint"></p>
        <div class="actions" style="justify-content:flex-end;">
          <button class="ghost" id="restartBtn">重启 MiPlay</button>
          <button class="primary" id="loginBtn">登录账号</button>
        </div>
      </section>

      <section class="panel panel-stack">
        <div class="panel-head">
          <div class="panel-copy">
            <h2>音箱列表</h2>
            <p>勾选要暴露给 AirPlay 的小米音箱，并为每个目标设置独立名称。</p>
          </div>
          <button class="icon-btn" id="syncDevicesBtn" type="button" title="同步设备" aria-label="同步设备">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="currentColor" d="M12 5a7 7 0 0 1 6.65 4.83l1.56-.62A8.68 8.68 0 0 0 12 3a8.85 8.85 0 0 0-6.32 2.68L4 7.35V4H2.35v6.99h7V9.34H5.2l1.65-1.65A7.2 7.2 0 0 1 12 5m9.65 5.01h-7V11.66h4.15l-1.65 1.65A7.2 7.2 0 0 1 12 19a7 7 0 0 1-6.65-4.83l-1.56.62A8.68 8.68 0 0 0 12 21a8.85 8.85 0 0 0 6.32-2.68L20 16.65V20h1.65z"/>
            </svg>
          </button>
        </div>
        <div class="device-list" id="deviceList">
          <div class="loading">请先登录并同步设备。</div>
        </div>
        <p class="hint" id="saveHint"></p>
        <div class="actions bottom-right">
          <button class="primary" id="saveBtn">保存并重启</button>
        </div>
      </section>
    </div>

    <div class="footer">MiPlay AirPlay-only runtime</div>
  </div>

  <script>
    const themeStorageKey = "miplay-theme";
    const deviceModelMap = {
      "L06A": { model: "小爱音箱", image: "L06A.webp" },
      "L07A": { model: "Redmi小爱音箱 Play", image: "L07A.webp" },
      "S12": { model: "小米AI音箱", image: "S12_S12A_MDZ-25-DA.webp" },
      "S12A": { model: "小米AI音箱", image: "S12_S12A_MDZ-25-DA.webp" },
      "MDZ-25-DA": { model: "小米AI音箱", image: "S12_S12A_MDZ-25-DA.webp" },
      "LX5A": { model: "小爱音箱 万能遥控版", image: "LX5A.webp" },
      "LX05": { model: "小爱音箱Play (2019款)", image: "LX05.webp" },
      "L15A": { model: "小米AI音箱（第二代）", image: "L15A.webp" },
      "L16A": { model: "Xiaomi Sound", image: "L16A.webp" },
      "L17A": { model: "Xiaomi Sound Pro", image: "L17A.webp" },
      "LX06": { model: "小爱音箱Pro", image: "LX06.webp" },
      "LX01": { model: "小爱音箱mini", image: "LX01.webp" },
      "L05B": { model: "小爱音箱Play", image: "L05B.webp" },
      "L05C": { model: "小爱音箱Play 增强版", image: "L05C.webp" },
      "L09A": { model: "小爱音箱Art", image: "L09A.webp" },
      "L09B": { model: "小爱音箱Art 电池版", image: "L09B.webp" },
      "LX04": { model: "小爱触屏音箱", image: "LX04_X10A_X08A.webp" },
      "X10A": { model: "小爱触屏音箱", image: "LX04_X10A_X08A.webp" },
      "X08A": { model: "小爱触屏音箱", image: "LX04_X10A_X08A.webp" },
      "X08C": { model: "小米触屏音箱", image: "X08C_X08E_X8F.webp" },
      "X08E": { model: "小米触屏音箱", image: "X08C_X08E_X8F.webp" },
      "X8F": { model: "小米触屏音箱", image: "X08C_X08E_X8F.webp" },
      "M01": { model: "小爱音箱HD", image: "L05B.webp" },
      "XMYX01JY": { model: "小爱音箱HD", image: "L05B.webp" },
      "OH2P": { model: "Xiaomi 智能音箱 Pro", image: "OH2P.webp" },
      "OH2": { model: "Xiaomi 智能音箱", image: "OH2.webp" }
    };

    let currentSetting = {};
    let currentTargets = [];
    let discoveredDevices = [];
    let runtimeTargets = [];

    document.addEventListener("DOMContentLoaded", init);

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      document.getElementById("themeToggle").textContent = theme === "dark" ? "日间" : "夜间";
    }

    function initTheme() {
      const savedTheme = localStorage.getItem(themeStorageKey);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = savedTheme || (prefersDark ? "dark" : "light");
      applyTheme(theme);
      document.getElementById("themeToggle").addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem(themeStorageKey, next);
        applyTheme(next);
      });
    }

    async function init() {
      initTheme();
      bindEvents();
      await Promise.all([fetchSetting(true), fetchRuntimeTargets()]);
    }

    function bindEvents() {
      document.getElementById("syncDevicesBtn").addEventListener("click", syncDevices);
      document.getElementById("restartBtn").addEventListener("click", restartApp);
      document.getElementById("loginBtn").addEventListener("click", saveAccount);
      document.getElementById("saveBtn").addEventListener("click", saveTargets);
    }

    function getDeviceInfo(hardware) {
      if (!hardware) return { model: "", image: "L05B.webp" };
      if (deviceModelMap[hardware]) return deviceModelMap[hardware];
      for (const key in deviceModelMap) {
        if (hardware.includes(key)) return deviceModelMap[key];
      }
      return { model: hardware, image: "L05B.webp" };
    }

    function getRuntimeMap(items) {
      return new Map((items || []).map((item) => [item.did, item]));
    }

    function buildCookie(userId, passToken) {
      if (!userId || !passToken) return "";
      return `userId=${userId}; passToken=${passToken}`;
    }

    function renderStatus(status) {
      const title = document.getElementById("statusTitle");
      const text = document.getElementById("statusText");
      const counts = document.getElementById("statusCounts");

      if (status.running) {
        title.textContent = "MiPlay 运行中";
        text.textContent = status.status_message || "已启动。";
      } else {
        title.textContent = "MiPlay 未运行";
        text.textContent = status.status_message || "等待配置。";
      }
      counts.textContent = `${status.bridges_count || 0} 个运行中 / ${status.targets_count || 0} 个已启用`;
    }

    async function fetchSetting(withDevices = false) {
      const response = await fetch(`/api/setting?need_device_list=${withDevices ? "true" : "false"}`);
      const data = await response.json();
      currentSetting = data;
      currentTargets = data.targets || [];
      renderStatus(data.status || {});

      document.getElementById("account").value = data.xiaomi.account || "";
      document.getElementById("password").value = "";
      if (data.xiaomi.cookie) {
        const userIdMatch = data.xiaomi.cookie.match(/userId=([^;]+)/);
        const passTokenMatch = data.xiaomi.cookie.match(/passToken=([^;]+)/);
        document.getElementById("userId").value = userIdMatch ? userIdMatch[1] : "";
        document.getElementById("passToken").value = passTokenMatch ? passTokenMatch[1] : "";
      }

      if (withDevices) {
        discoveredDevices = data.device_list || [];
      }
      renderDeviceList();
    }

    async function fetchRuntimeTargets() {
      const response = await fetch("/api/targets");
      runtimeTargets = await response.json();
      renderDeviceList();
    }

    function renderDeviceList() {
      const container = document.getElementById("deviceList");
      const runtimeMap = getRuntimeMap(runtimeTargets);
      const savedMap = new Map((currentTargets || []).map((item) => [item.did, item]));

      if (!discoveredDevices.length) {
        container.innerHTML = '<div class="loading">未发现设备，请先同步。</div>';
        return;
      }

      container.innerHTML = discoveredDevices.map((device) => {
        const did = device.miotDID || "";
        const saved = savedMap.get(did) || {};
        const runtime = runtimeMap.get(did) || {};
        const airplayName = saved.airplay_name || saved.name || device.name || did;
        const deviceInfo = getDeviceInfo(saved.hardware || device.hardware || "");
        const imagePath = `/static/devicespic/${deviceInfo.image}`;
        const enabled = Boolean(saved.enabled);
        const modelAndCode = [deviceInfo.model, device.hardware || ""].filter(Boolean).join(" · ");
        const statusText = runtime.client_name ? `来自·${escapeHtml(runtime.client_name)} 的 iPhone` : (enabled ? "待命" : "未启用");
        const portText = runtime.rtsp_port ? runtime.rtsp_port : "n/a";

        return `
          <div class="device-row" data-did="${escapeHtml(did)}">
            <input class="device-check" type="checkbox" data-role="enabled" ${enabled ? "checked" : ""}>
            <div class="device-card${enabled ? " enabled" : ""}">
              <div class="device-head">
                <div class="device-image" style="background-image:url('${imagePath}')"></div>
                <div class="device-title">
                  <div class="device-title-row">
                    <div class="name-editor" data-role="name-editor">
                      <span class="name-display" data-role="name-display">${escapeHtml(saved.name || device.name || did)}</span>
                      <input class="name-input" data-role="name" value="${escapeHtml(saved.name || device.name || did)}" aria-label="音箱名称">
                      <svg class="edit-icon" data-role="edit-name" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75zM20.71 7.04a1 1 0 0 0 0-1.41L18.37 3.29a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75z"/>
                      </svg>
                    </div>
                    <span class="model-text">${escapeHtml(modelAndCode)}</span>
                  </div>
                  <div class="meta"></div>
                </div>
              </div>
              <div class="device-grid">
                <div>
                  <div class="status-note">${statusText}</div>
                </div>
                <div class="device-status">
                  <span class="status-chip">${escapeHtml(portText)}</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll('.device-check').forEach((checkbox) => {
        checkbox.addEventListener('change', (event) => {
          const card = event.target.closest('.device-row').querySelector('.device-card');
          card.classList.toggle('enabled', event.target.checked);
        });
      });

      container.querySelectorAll('[data-role="edit-name"]').forEach((icon) => {
        icon.addEventListener('click', (event) => {
          const editor = event.target.closest('.name-editor');
          editor.classList.add('editing');
          const input = editor.querySelector('[data-role="name"]');
          input.focus();
          input.select();
        });
      });

      container.querySelectorAll('[data-role="name"]').forEach((input) => {
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            input.blur();
          }
        });
        input.addEventListener('blur', () => {
          const editor = input.closest('[data-role="name-editor"]');
          const display = editor.querySelector('[data-role="name-display"]');
          const value = input.value.trim() || "未命名音箱";
          input.value = value;
          display.textContent = value;
          editor.classList.remove('editing');
        });
      });
    }

    async function saveAccount() {
      const account = document.getElementById("account").value.trim();
      const password = document.getElementById("password").value.trim();
      const userId = document.getElementById("userId").value.trim();
      const passToken = document.getElementById("passToken").value.trim();
      const cookie = buildCookie(userId, passToken);
      const hint = document.getElementById("accountHint");

      if (!cookie && !(account && password)) {
        hint.textContent = "请输入账号密码或 userId / passToken。";
        hint.className = "hint warning";
        return;
      }

      await fetch("/api/setting", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          xiaomi: {
            account,
            password,
            cookie
          }
        })
      });
      hint.textContent = "已保存，正在重启。";
      hint.className = "success";
    }

    async function syncDevices() {
      await fetchSetting(true);
    }

    async function restartApp() {
      const hint = document.getElementById("accountHint");
      await fetch("/api/restart", { method: "POST" });
      hint.textContent = "已发送重启请求。";
      hint.className = "success";
    }

    function collectTargets() {
      return Array.from(document.querySelectorAll("#deviceList .device-row")).map((card) => {
        const did = card.dataset.did || "";
        const device = discoveredDevices.find((item) => (item.miotDID || "") === did) || {};
        const previous = (currentTargets || []).find((item) => item.did === did) || {};
        return {
          id: previous.id || did,
          did,
          name: card.querySelector('[data-role="name"]').value.trim() || device.name || did,
          airplay_name: card.querySelector('[data-role="name"]').value.trim() || device.name || did,
          enabled: card.querySelector('[data-role="enabled"]').checked,
          device_id: previous.device_id || device.deviceID || "",
          hardware: previous.hardware || device.hardware || ""
        };
      });
    }

    async function saveTargets() {
      const hint = document.getElementById("saveHint");
      await fetch("/api/setting", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ targets: collectTargets() })
      });
      hint.textContent = "已保存，正在重启。";
      hint.className = "success";
    }
  </script>
</body>
</html>
